<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ink Warrior: Path of Zen - True Sword Dance (Phaser)</title>
  <link href="./style.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
    
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      font-family: 'Noto Serif KR', serif;
      touch-action: none;
    }
    
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dcdcdc;
      overflow: hidden;
    }
    
    /* We'll let Phaser render its own canvas here */
    canvas {
      display: block;
      background-color: transparent !important; /* Keep Phaser transparent to show background if needed, or colored */
    }
    
    #paper-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.15;
      background-image: url('https://www.transparenttextures.com/patterns/p6.png');
      z-index: 5;
    }
    
    .ui-layer {
      position: absolute;
      top: 30px;
      left: 30px;
      pointer-events: none;
      color: #000;
      z-index: 20;
    }
    
    #dialogue-box {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.98);
      border-left: 10px solid #000;
      padding: 25px;
      display: none;
      z-index: 100;
      box-shadow: 15px 15px 0 rgba(0,0,0,0.2);
    }
    
    #mobile-controls {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 0 30px;
      pointer-events: none;
      z-index: 30;
    }
    
    .btn-action {
      width: 65px;
      height: 65px;
      background: rgba(0,0,0,0.85);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-weight: bold;
      pointer-events: auto;
      user-select: none;
    }
    
    @media (max-width: 768px) { #mobile-controls { display: flex; } }
    
    #msg-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 3rem;
      border: 6px solid #000;
      text-align: center;
      display: none;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="paper-overlay"></div>
    <!-- Phaser will inject its canvas inside this container via main.js -->

    <!-- UI Layer -->
    <div class="ui-layer">
      <div class="flex flex-col gap-1">
        <div class="text-3xl font-bold italic tracking-tighter">墨影 <span class="text-lg not-italic opacity-60">LV.</span><span id="ui-level" class="text-2xl">1</span></div>
        <div class="w-64 h-4 bg-gray-300 border-2 border-black overflow-hidden mt-1 relative">
          <div id="hp-bar" class="h-full bg-black transition-all duration-500" style="width: 100%;"></div>
        </div>
        <div id="story-progress" class="text-[10px] mt-2 font-bold tracking-[0.3em] text-gray-500 italic uppercase">Progress: 0%</div>
        <div class="text-[9px] text-gray-400 font-bold mt-1 uppercase">WASD: Move | S: Guard | F/R: Attack | Click: Text Next</div>
        <div id="guard-status" class="text-[10px] text-red-700 font-bold opacity-0 transition-opacity">GUARD ACTIVE</div>
      </div>
    </div>

    <!-- Dialogue Box -->
    <div id="dialogue-box">
      <div id="dialogue-name" class="font-bold text-xl mb-2 text-black">무사</div>
      <div id="dialogue-text" class="text-lg leading-relaxed text-gray-800">...</div>
      <div class="text-right text-[10px] mt-6 text-gray-400 font-bold uppercase tracking-widest animate-pulse">Press any key to Advance</div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
      <div class="flex gap-2">
        <div class="btn-action" id="btn-left">◀</div>
        <div class="btn-action" id="btn-right">▶</div>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div class="btn-action bg-gray-700" id="btn-run">走</div>
        <div class="btn-action bg-gray-700" id="btn-jump">跳</div>
        <div class="btn-action bg-blue-900" id="btn-guard">守</div>
        <div class="btn-action bg-black" id="btn-attack">斬</div>
        <div class="btn-action bg-red-950" id="btn-heavy">滅</div>
      </div>
    </div>

    <!-- Game Over / Restart Box -->
    <div id="msg-box">
      <h2 class="text-5xl font-bold mb-6 italic">윤회(輪廻)</h2>
      <p class="mb-10 italic text-gray-500 text-lg">붓끝의 선이 끊겼으나, 도는 끊이지 않습니다.</p>
      <button onclick="location.reload()" class="border-4 border-black hover:bg-black hover:text-white px-12 py-4 font-black transition uppercase tracking-[0.2em]">Resurrect</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
